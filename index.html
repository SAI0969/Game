<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Ultimate Car Racing</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    touch-action:none;
    font-family:Arial;
    background:#87CEEB;
}

/* GAME */

#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
    background:
    linear-gradient(
        to bottom,
        #87CEEB 0%,
        #87CEEB 45%,
        #3fa63f 45%,
        #3fa63f 100%
    );
}

/* ROAD */

#road{
    position:absolute;
    width:min(100vw,500px);
    height:100%;
    left:50%;
    transform:translateX(-50%);
    background:#333;
    overflow:hidden;
    border-left:5px solid white;
    border-right:5px solid white;
    transition:left 0.08s linear;
}

/* ROAD LINES */

.line{
    position:absolute;
    width:10px;
    height:90px;
    background:white;
    left:50%;
    transform:translateX(-50%);
}

/* WATER */

.water{
    position:absolute;
    width:70px;
    height:120px;
    background:rgba(0,150,255,0.4);
    border-radius:50%;
    filter:blur(2px);
}

/* PLAYER */

#bike{
    position:absolute;
    width:55px;
    height:100px;
    background:red;
    border-radius:14px;
    bottom:80px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
}

/* ENEMIES */

.enemy{
    position:absolute;
    width:55px;
    height:100px;
    background:gold;
    border-radius:14px;
    top:-150px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
}

/* INDICATORS */

.indicator{
    position:absolute;
    width:10px;
    height:10px;
    background:orange;
    border-radius:50%;
    top:40px;
    opacity:0;
}

.leftIndicator{
    left:-6px;
}

.rightIndicator{
    right:-6px;
}

.blink{
    animation:blink 0.4s infinite;
}

@keyframes blink{

    0%{opacity:0;}

    50%{opacity:1;}

    100%{opacity:0;}
}

/* BULLETS */

.bullet{
    position:absolute;
    width:10px;
    height:24px;
    background:orange;
    border-radius:10px;
}

/* SCORE */

#score{
    position:absolute;
    top:15px;
    left:15px;
    color:white;
    font-size:26px;
    z-index:100;
    text-shadow:2px 2px 5px black;
}

/* START */

#start{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.88);
    z-index:200;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    color:white;
    padding:20px;
}

.levelBtn{
    width:220px;
    padding:18px;
    margin:10px;
    font-size:24px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

/* CONTROLS */

#controls{
    position:absolute;
    width:100%;
    bottom:12px;
    display:flex;
    justify-content:space-between;
    padding:0 12px;
    z-index:100;
}

.btn{
    width:75px;
    height:75px;
    border-radius:50%;
    background:rgba(255,255,255,0.25);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:34px;
    backdrop-filter:blur(5px);
    user-select:none;
}

@media(min-width:700px){

    #road{
        width:500px;
    }

    .btn{
        width:85px;
        height:85px;
        font-size:40px;
    }

    #bike,
    .enemy{
        width:60px;
        height:110px;
    }
}

</style>
</head>
<body>

<div id="game">

    <div id="score">Score : 0</div>

    <div id="start">

        <h1>🏍 ULTIMATE BIKE RACING</h1>

        <br>

        SELECT DIFFICULTY

        <br><br>

        <button class="levelBtn"
        onclick="setDifficulty('easy')">
        EASY
        </button>

        <button class="levelBtn"
        onclick="setDifficulty('medium')">
        MEDIUM
        </button>

        <button class="levelBtn"
        onclick="setDifficulty('hard')">
        HARD
        </button>

        <br><br>

        ◀ ▶ MOVE <br>
        ⬇ BRAKE

    </div>

    <div id="road">

        <div id="bike"></div>

    </div>

    <div id="controls">

        <div class="btn" id="leftBtn">◀</div>

        <div class="btn" id="brakeBtn">⬇</div>

        <div class="btn" id="rightBtn">▶</div>

    </div>

</div>

<script>

const road = document.getElementById("road");
const bike = document.getElementById("bike");
const scoreBox = document.getElementById("score");
const startScreen = document.getElementById("start");

const leftBtn = document.getElementById("leftBtn");
const rightBtn = document.getElementById("rightBtn");
const brakeBtn = document.getElementById("brakeBtn");

let keys = {
    left:false,
    right:false,
    brake:false
};

let player = {
    x:0,
    speed:8,
    score:0
};

let enemies = [];
let bullets = [];

let gameRunning = false;
let animationId;

let difficulty = "easy";

let enemyCount = 4;
let bulletSpeed = 8;
let gameSpeed = 6;

let lanes = [];

let curve = 0;

/* RESPONSIVE LANES */

function setupLanes(){

    const roadWidth =
    road.offsetWidth;

    const laneCount = 4;

    const spacing =
    (roadWidth - 80) / laneCount;

    lanes = [];

    for(let i=0;i<laneCount;i++){

        lanes.push(
            15 + (i * spacing)
        );
    }
}

/* FULLSCREEN */

function enableFullscreen(){

    if(window.innerWidth < 700){

        const elem =
        document.documentElement;

        if(elem.requestFullscreen){

            elem.requestFullscreen();

        }else if(elem.webkitRequestFullscreen){

            elem.webkitRequestFullscreen();
        }
    }
}

/* ROAD LINES */

for(let i=0;i<8;i++){

    let line =
    document.createElement("div");

    line.classList.add("line");

    line.y = i * 150;

    line.style.top =
    line.y + "px";

    road.appendChild(line);
}

/* WATER */

for(let i=0;i<4;i++){

    let water =
    document.createElement("div");

    water.classList.add("water");

    water.y = -(i * 500);

    water.style.left =
    Math.random()*300 + "px";

    water.style.top =
    water.y + "px";

    road.appendChild(water);
}

/* CREATE ENEMIES */

function createEnemies(){

    enemies.forEach(e => e.remove());

    enemies = [];

    let used = [];

    for(let i=0;i<enemyCount;i++){

        let enemy =
        document.createElement("div");

        enemy.classList.add("enemy");

        let possible =
        lanes.filter(l =>
            !used.includes(l)
        );

        if(possible.length === 0){

            used = [];

            possible = lanes;
        }

        let lane =
        possible[
            Math.floor(
                Math.random()*possible.length
            )
        ];

        used.push(lane);

        enemy.style.left =
        lane + "px";

        enemy.style.top =
        -(i * 260) + "px";

        enemy.dataset.targetLane =
        lane;

        enemy.dataset.timer = 0;

        /* INDICATORS */

        let left =
        document.createElement("div");

        left.classList.add(
            "indicator",
            "leftIndicator"
        );

        let right =
        document.createElement("div");

        right.classList.add(
            "indicator",
            "rightIndicator"
        );

        enemy.appendChild(left);
        enemy.appendChild(right);

        road.appendChild(enemy);

        enemies.push(enemy);
    }
}

/* CHOOSE LANE */

function chooseLane(enemy){

    let current =
    parseInt(enemy.style.left);

    let possible =
    lanes.filter(l =>
        Math.abs(l-current) > 50
    );

    let target =
    possible[
        Math.floor(
            Math.random()*possible.length
        )
    ];

    enemy.dataset.targetLane =
    target;

    let direction =
    target > current
    ? "right"
    : "left";

    /* BLUFF */

    if(
        difficulty !== "easy" &&
        Math.random() < 0.45
    ){

        direction =
        direction === "left"
        ? "right"
        : "left";
    }

    let leftLight =
    enemy.querySelector(".leftIndicator");

    let rightLight =
    enemy.querySelector(".rightIndicator");

    leftLight.classList.remove("blink");
    rightLight.classList.remove("blink");

    if(direction === "left"){

        leftLight.classList.add("blink");

    }else{

        rightLight.classList.add("blink");
    }
}

/* BULLETS */

function shootBullet(enemy){

    let bullet =
    document.createElement("div");

    bullet.classList.add("bullet");

    bullet.style.left =
    (enemy.offsetLeft + 25) + "px";

    bullet.style.top =
    (enemy.offsetTop + 80) + "px";

    let dir =
    Math.random() < 0.5 ? -1 : 1;

    if(
        difficulty !== "easy" &&
        Math.random() < 0.5
    ){

        dir *= -1;
    }

    bullet.dataset.dir = dir;

    road.appendChild(bullet);

    bullets.push(bullet);
}

/* SHOOTING */

setInterval(()=>{

    if(gameRunning){

        let randomEnemy =
        enemies[
            Math.floor(
                Math.random()*enemies.length
            )
        ];

        shootBullet(randomEnemy);
    }

},1200);

/* DIFFICULTY */

function setDifficulty(level){

    enableFullscreen();

    difficulty = level;

    if(level === "easy"){

        enemyCount = 4;
        gameSpeed = 6;
        bulletSpeed = 8;
    }

    if(level === "medium"){

        enemyCount = 6;
        gameSpeed = 8;
        bulletSpeed = 12;
    }

    if(level === "hard"){

        enemyCount = 8;
        gameSpeed = 11;
        bulletSpeed = 18;
    }

    startGame();
}

/* START */

function startGame(){

    gameRunning = true;

    setupLanes();

    player.score = 0;

    player.x =
    (road.offsetWidth/2) - 30;

    bike.style.left =
    player.x + "px";

    scoreBox.innerHTML =
    "Score : 0";

    startScreen.style.display =
    "none";

    createEnemies();

    bullets.forEach(b => b.remove());

    bullets = [];

    cancelAnimationFrame(animationId);

    animationId =
    requestAnimationFrame(playGame);
}

/* ROAD MOVEMENT */

function moveRoad(){

    curve += 0.02;

    let maxCurve =
    window.innerWidth < 700
    ? 35
    : 90;

    let roadMove =
    Math.sin(curve) * maxCurve;

    road.style.left =
    `calc(50% + ${roadMove}px)`;

    bike.style.transform =
    `rotate(${roadMove/18}deg)`;
}

/* MOVE LINES */

function moveLines(){

    document.querySelectorAll(".line")
    .forEach(line=>{

        if(line.y >=
        window.innerHeight){

            line.y = -120;
        }

        line.y += player.speed;

        line.style.top =
        line.y + "px";
    });
}

/* MOVE WATER */

function moveWater(){

    document.querySelectorAll(".water")
    .forEach(water=>{

        water.y += player.speed;

        if(
            water.y >
            window.innerHeight
        ){

            water.y = -500;

            water.style.left =
            Math.random()*300 + "px";
        }

        water.style.top =
        water.y + "px";

        let bikeRect =
        bike.getBoundingClientRect();

        let waterRect =
        water.getBoundingClientRect();

        if(

            bikeRect.left < waterRect.right &&
            bikeRect.right > waterRect.left &&
            bikeRect.top < waterRect.bottom &&
            bikeRect.bottom > waterRect.top

        ){

            player.x +=
            Math.sin(curve)*2;
        }

    });
}

/* MOVE ENEMIES */

function moveEnemies(){

    enemies.forEach(enemy=>{

        let top =
        parseInt(enemy.style.top);

        if(top > window.innerHeight){

            enemy.style.top =
            "-250px";

            let lane =
            lanes[
                Math.floor(
                    Math.random()*lanes.length
                )
            ];

            enemy.style.left =
            lane + "px";

            enemy.dataset.targetLane =
            lane;

            player.score++;

            scoreBox.innerHTML =
            "Score : " +
            player.score;

        }else{

            enemy.style.top =
            top + player.speed + "px";
        }

        enemy.dataset.timer++;

        if(enemy.dataset.timer > 90){

            chooseLane(enemy);

            enemy.dataset.timer = 0;
        }

        let current =
        parseInt(enemy.style.left);

        let target =
        parseInt(enemy.dataset.targetLane);

        if(current < target){

            current += 2;
        }

        if(current > target){

            current -= 2;
        }

        enemy.style.left =
        current + "px";

        let bikeRect =
        bike.getBoundingClientRect();

        let enemyRect =
        enemy.getBoundingClientRect();

        if(

            bikeRect.left < enemyRect.right &&
            bikeRect.right > enemyRect.left &&
            bikeRect.top < enemyRect.bottom &&
            bikeRect.bottom > enemyRect.top

        ){

            endGame();
        }

    });
}

/* MOVE BULLETS */

function moveBullets(){

    bullets.forEach((bullet,index)=>{

        let top =
        parseInt(bullet.style.top);

        let left =
        parseInt(bullet.style.left);

        bullet.style.top =
        top + bulletSpeed + "px";

        bullet.style.left =
        left +
        parseInt(
            bullet.dataset.dir
        ) * 2 + "px";

        if(top > window.innerHeight){

            bullet.remove();

            bullets.splice(index,1);
        }

        let bikeRect =
        bike.getBoundingClientRect();

        let bulletRect =
        bullet.getBoundingClientRect();

        if(

            bikeRect.left < bulletRect.right &&
            bikeRect.right > bulletRect.left &&
            bikeRect.top < bulletRect.bottom &&
            bikeRect.bottom > bulletRect.top

        ){

            endGame();
        }

    });
}

/* LOOP */

function playGame(){

    if(!gameRunning) return;

    if(keys.brake){

        player.speed = 3;

    }else{

        player.speed = gameSpeed;
    }

    moveRoad();

    moveLines();

    moveWater();

    moveEnemies();

    moveBullets();

    if(
        keys.left &&
        player.x > 0
    ){

        player.x -= player.speed;
    }

    if(
        keys.right &&
        player.x <
        road.offsetWidth - 70
    ){

        player.x += player.speed;
    }

    bike.style.left =
    player.x + "px";

    animationId =
    requestAnimationFrame(playGame);
}

/* END */

function endGame(){

    gameRunning = false;

    cancelAnimationFrame(animationId);

    startScreen.style.display =
    "flex";

    startScreen.innerHTML =

    `
    <h1>💥 GAME OVER</h1>

    <br>

    SCORE : ${player.score}

    <br><br>

    <button class="levelBtn"
    onclick="location.reload()">
    PLAY AGAIN
    </button>
    `;
}

/* KEYBOARD */

document.addEventListener("keydown",(e)=>{

    if(e.key === "ArrowLeft"){

        keys.left = true;
    }

    if(e.key === "ArrowRight"){

        keys.right = true;
    }

    if(e.key === "ArrowDown"){

        keys.brake = true;
    }

});

document.addEventListener("keyup",(e)=>{

    if(e.key === "ArrowLeft"){

        keys.left = false;
    }

    if(e.key === "ArrowRight"){

        keys.right = false;
    }

    if(e.key === "ArrowDown"){

        keys.brake = false;
    }

});

/* MOBILE */

leftBtn.addEventListener(
"touchstart",
()=>{

    keys.left = true;
});

leftBtn.addEventListener(
"touchend",
()=>{

    keys.left = false;
});

rightBtn.addEventListener(
"touchstart",
()=>{

    keys.right = true;
});

rightBtn.addEventListener(
"touchend",
()=>{

    keys.right = false;
});

brakeBtn.addEventListener(
"touchstart",
()=>{

    keys.brake = true;
});

brakeBtn.addEventListener(
"touchend",
()=>{

    keys.brake = false;
});

</script>

</body>
</html>
